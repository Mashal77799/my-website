<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وقفة</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:#0b1c2d;
color:white;
}

header{
background:#081521;
padding:20px;
text-align:center;
font-size:30px;
color:white;
border-bottom:2px solid white;
}

header span{
border-bottom:3px solid white;
padding-bottom:5px;
}

.cart-btn, .admin-btn{
position:absolute;
top:20px;
background:white;
color:#0b1c2d;
border:none;
padding:8px 15px;
cursor:pointer;
border-radius:8px;
font-weight:bold;
}

.cart-btn{ left:20px; }
.admin-btn{ right:20px; }

.section{
padding:30px;
text-align:center;
}

.product{
border:2px solid white;
padding:15px;
margin:15px;
display:inline-block;
width:220px;
border-radius:12px;
}

.price{
font-weight:bold;
margin:5px 0;
}

button{
background:white;
color:#0b1c2d;
border:none;
padding:8px;
cursor:pointer;
border-radius:8px;
margin-top:5px;
font-weight:bold;
}

#cart, #adminPanel{
display:none;
position:fixed;
top:0;
left:0;
width:320px;
height:100%;
background:#081521;
padding:20px;
overflow:auto;
border-right:2px solid white;
}

input, select{
width:100%;
padding:6px;
margin:5px 0;
border-radius:6px;
border:none;
}

h3{margin-top:0;}

</style>
</head>

<body>

<header>
<span>وقفة</span>
<button class="cart-btn" onclick="toggleCart()">السلة</button>
<button class="admin-btn" onclick="adminLogin()">لوحة التحكم</button>
</header>

<div class="section" id="products"></div>

<!-- السلة -->
<div id="cart">
<button onclick="toggleCart()">✕</button>
<h3>السلة</h3>
<ul id="cartItems"></ul>
<h4 id="total"></h4>
</div>

<!-- لوحة التحكم -->
<div id="adminPanel">
<button onclick="toggleAdmin()">✕</button>
<h3>لوحة التحكم</h3>

<input type="text" id="pName" placeholder="اسم المنتج">
<input type="number" id="pPrice" placeholder="السعر">
<select id="pStatus">
<option value="true">متوفر</option>
<option value="false">غير متوفر</option>
</select>

<button onclick="addProduct()">إضافة منتج</button>
<button onclick="updateProduct()">تعديل المنتج المحدد</button>
<button onclick="deleteProduct()">حذف المنتج المحدد</button>

<select id="productSelect"></select>
</div>

<script>
let products=[
{name:"قلم كارتير",price:99,available:true},
{name:"قلم مونت بلاك",price:99,available:true},
{name:"قلم جي فنشي",price:99,available:true},
{name:"ساعة كاسيو",price:120,available:true},
{name:"ساعة كارتير",price:120,available:true},
{name:"ساعة روليكس",price:120,available:true},
{name:"خاتم رجالي",price:30,available:true},
{name:"سبحة بكلايت",price:45,available:true},
{name:"سبحة عظم جمل",price:45,available:true}
];

let cart=[];
let total=0;

function renderProducts(){
let container=document.getElementById("products");
container.innerHTML="";
products.forEach((p,index)=>{
container.innerHTML+=`
<div class="product">
<p>${p.name}</p>
<p class="price">${p.price} ريال</p>
<p>${p.available?"متوفر":"غير متوفر"}</p>
<button ${!p.available?"disabled":""} onclick="addToCart(${index})">أضف للسلة</button>
</div>`;
});
updateSelect();
}

function addToCart(i){
cart.push(products[i]);
total+=products[i].price;
updateCart();
}

function updateCart(){
let list=document.getElementById("cartItems");
list.innerHTML="";
cart.forEach((item,index)=>{
list.innerHTML+=`<li>${item.name} - ${item.price} ريال 
<button onclick="removeFromCart(${index})">❌</button></li>`;
});
document.getElementById("total").innerText="المجموع: "+total+" ريال";
}

function removeFromCart(i){
total-=cart[i].price;
cart.splice(i,1);
updateCart();
}

function toggleCart(){
let c=document.getElementById("cart");
c.style.display=c.style.display==="block"?"none":"block";
}

function adminLogin(){
let pass=prompt("أدخل كلمة المرور:");
if(pass==="1234"){
document.getElementById("adminPanel").style.display="block";
}
}

function toggleAdmin(){
document.getElementById("adminPanel").style.display="none";
}

function addProduct(){
let n=document.getElementById("pName").value;
let pr=parseInt(document.getElementById("pPrice").value);
let st=document.getElementById("pStatus").value==="true";
if(n && pr){
products.push({name:n,price:pr,available:st});
renderProducts();
}
}

function updateProduct(){
let i=document.getElementById("productSelect").value;
products[i].name=document.getElementById("pName").value;
products[i].price=parseInt(document.getElementById("pPrice").value);
products[i].available=document.getElementById("pStatus").value==="true";
renderProducts();
}

function deleteProduct(){
let i=document.getElementById("productSelect").value;
products.splice(i,1);
renderProducts();
}

function updateSelect(){
let select=document.getElementById("productSelect");
select.innerHTML="";
products.forEach((p,i)=>{
select.innerHTML+=`<option value="${i}">${p.name}</option>`;
});
}

renderProducts();
</script>

</body>
</html>
