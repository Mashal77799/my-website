<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وقفة</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:#0f172a;
color:white;
text-align:center;
}

/* العنوان */
.main-title{
margin-top:60px;
font-size:55px;
}

.main-line{
width:250px;
height:4px;
background:white;
margin:15px auto 40px auto;
border-radius:5px;
}

/* الأقسام */
.categories{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-bottom:40px;
}

.cat{
width:120px;
height:120px;
border-radius:50%;
background:white;
color:#0f172a;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.cat:hover{
transform:scale(1.1);
}

/* المنتجات */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.product{
border:2px solid white;
border-radius:18px;
padding:15px;
}

.price{
margin:10px 0;
font-weight:bold;
}

button{
padding:8px 15px;
border-radius:20px;
border:none;
cursor:pointer;
}

/* السلة */
.cart{
position:fixed;
top:0;
left:-100%;
width:320px;
height:100%;
background:#1e293b;
padding:20px;
transition:.3s;
overflow:auto;
text-align:right;
}

.cart.active{
left:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
background:#0f172a;
padding:8px;
border-radius:12px;
}

.total{
margin-top:15px;
font-weight:bold;
}

.cart-btn, .admin-btn{
position:fixed;
top:15px;
background:white;
color:#0f172a;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

.cart-btn{left:15px;}
.admin-btn{right:15px;}

</style>
</head>

<body>

<div class="cart-btn" onclick="toggleCart()">🛒</div>
<div class="admin-btn" onclick="admin()">تحكم</div>

<h1 class="main-title">وقفة</h1>
<div class="main-line"></div>

<div class="categories">
<div class="cat" onclick="show('pens')">أقلام</div>
<div class="cat" onclick="show('beads')">سبحات</div>
<div class="cat" onclick="show('watches')">ساعات</div>
<div class="cat" onclick="show('rings')">خواتم</div>
</div>

<div class="products" id="products"></div>

<div class="cart" id="cart">
<h3>السلة</h3>
<div id="cartItems"></div>
<div class="total">المجموع: <span id="total">0</span> ريال</div>
<button onclick="toggleCart()">إغلاق</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || {
pens:[
{name:"قلم كارتير",price:99,available:true},
{name:"قلم مونت بلاك",price:99,available:true},
{name:"قلم جي فنشي",price:99,available:true}
],
watches:[
{name:"ساعة كاسيو",price:120,available:true},
{name:"ساعة كارتير",price:120,available:true},
{name:"ساعة روليكس",price:120,available:true}
],
rings:[
{name:"خاتم رجالي",price:30,available:true}
],
beads:[
{name:"سبحة بكلايت",price:45,available:true},
{name:"سبحة عظم جمل",price:45,available:true},
{name:"سبحة فاتوران",price:45,available:true}
]
};

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("cart",JSON.stringify(cart));
}

function show(cat){
let container=document.getElementById("products");
container.innerHTML="";
products[cat].forEach((p,i)=>{
container.innerHTML+=`
<div class="product">
<h3>${p.name}</h3>
<div class="price">${p.price} ريال</div>
${p.available ? `<button onclick="add('${cat}',${i})">أضف للسلة</button>` : `<div style="color:red;">غير متوفر</div>`}
</div>`;
});
}

function add(cat,i){
cart.push(products[cat][i]);
save();
renderCart();
}

function renderCart(){
let container=document.getElementById("cartItems");
container.innerHTML="";
let total=0;
cart.forEach((item,index)=>{
total+=item.price;
container.innerHTML+=`
<div class="cart-item">
<span>${item.name}</span>
<span>${item.price}</span>
<button onclick="removeItem(${index})">❌</button>
</div>`;
});
document.getElementById("total").innerText=total;
save();
}

function removeItem(i){
cart.splice(i,1);
renderCart();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function admin(){
let pass=prompt("أدخل كلمة المرور:");
if(pass==="1234"){
let action=prompt("1- إضافة منتج\n2- تعديل سعر\n3- تغيير توفر");
if(action=="1"){
let cat=prompt("الفئة؟ pens/watches/rings/beads");
let name=prompt("اسم المنتج:");
let price=parseInt(prompt("السعر:"));
products[cat].push({name:name,price:price,available:true});
}
if(action=="2"){
let cat=prompt("الفئة؟");
let index=prompt("رقم المنتج يبدأ من 0");
let newPrice=parseInt(prompt("السعر الجديد:"));
products[cat][index].price=newPrice;
}
if(action=="3"){
let cat=prompt("الفئة؟");
let index=prompt("رقم المنتج يبدأ من 0");
products[cat][index].available=!products[cat][index].available;
}
save();
alert("تم التحديث");
}
}

renderCart();
</script>

</body>
</html>
