<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وقفة</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:#0f172a;
color:white;
}

/* صفحة الدخول */
.landing{
height:100vh;
background:url("IMG_2277.png") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.landing h1{
font-size:50px;
text-decoration:underline;
}

.enter{
padding:12px 30px;
border-radius:25px;
border:none;
background:white;
color:#0f172a;
cursor:pointer;
font-weight:bold;
}

/* الهيدر */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#0f172a;
}

.logo{
font-size:28px;
text-decoration:underline;
}

.cart-btn{
cursor:pointer;
font-size:20px;
}

/* الأقسام */
.categories{
display:flex;
justify-content:center;
gap:15px;
margin:20px;
flex-wrap:wrap;
}

.cat{
background:white;
color:#0f172a;
padding:10px 20px;
border-radius:50px;
cursor:pointer;
font-weight:bold;
}

/* المنتجات */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.product{
border:2px solid white;
border-radius:18px;
padding:15px;
text-align:center;
}

.price{
margin:10px 0;
font-weight:bold;
}

button{
padding:8px 15px;
border-radius:20px;
border:none;
cursor:pointer;
}

/* السلة */
.cart{
position:fixed;
top:0;
left:-100%;
width:320px;
height:100%;
background:#1e293b;
padding:20px;
transition:.3s;
overflow:auto;
}

.cart.active{
left:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
background:#0f172a;
padding:8px;
border-radius:12px;
}

.total{
margin-top:15px;
font-weight:bold;
}

.close{
cursor:pointer;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="landing" id="landing">
<h1>وقفة</h1>
<button class="enter" onclick="enter()">دخول المتجر</button>
</div>

<div id="store" style="display:none;">

<header>
<div class="logo">وقفة</div>
<div class="cart-btn" onclick="toggleCart()">🛒</div>
</header>

<div class="categories">
<div class="cat" onclick="show('pens')">الأقلام</div>
<div class="cat" onclick="show('watches')">الساعات</div>
<div class="cat" onclick="show('rings')">الخواتم</div>
<div class="cat" onclick="show('beads')">السبح</div>
</div>

<div class="products" id="products"></div>

</div>

<div class="cart" id="cart">
<div class="close" onclick="toggleCart()">⬅ رجوع</div>
<div id="cartItems"></div>
<div class="total">المجموع: <span id="total">0</span> ريال</div>
</div>

<script>
let products={
pens:[
{name:"قلم كارتير",price:99},
{name:"قلم مونت بلاك",price:99},
{name:"قلم جي فنشي",price:99}
],
watches:[
{name:"ساعة كاسيو",price:120},
{name:"ساعة كارتير",price:120},
{name:"ساعة روليكس",price:120}
],
rings:[
{name:"خاتم رجالي",price:30}
],
beads:[
{name:"سبحة بكلايت",price:45},
{name:"سبحة عظم جمل",price:45},
{name:"سبحة فاتوران",price:45}
]
};

let cart=[];

function enter(){
document.getElementById("landing").style.display="none";
document.getElementById("store").style.display="block";
}

function show(cat){
let container=document.getElementById("products");
container.innerHTML="";
products[cat].forEach(p=>{
container.innerHTML+=`
<div class="product">
<h3>${p.name}</h3>
<div class="price">${p.price} ريال</div>
<button onclick='add(${JSON.stringify(p)})'>أضف للسلة</button>
</div>`;
});
}

function add(p){
cart.push(p);
renderCart();
}

function renderCart(){
let container=document.getElementById("cartItems");
container.innerHTML="";
let total=0;
cart.forEach((item,index)=>{
total+=item.price;
container.innerHTML+=`
<div class="cart-item">
<span>${item.name}</span>
<span>${item.price}</span>
<button onclick="removeItem(${index})">❌</button>
</div>`;
});
document.getElementById("total").innerText=total;
}

function removeItem(i){
cart.splice(i,1);
renderCart();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}
</script>

</body>
</html>
