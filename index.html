<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وقفه</title>

<style>
body{
margin:0;
font-family: 'Tajawal', sans-serif;
background:#0f172a;
color:white;
}

/* صفحة الدخول */
.landing{
height:100vh;
background:url("IMG_2277.png") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.enter-btn{
padding:15px 40px;
border-radius:30px;
border:none;
background:white;
color:#0f172a;
font-size:18px;
cursor:pointer;
}

/* الهيدر */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#0f172a;
}

.logo{
font-size:28px;
text-decoration:underline;
}

.cart-icon{
cursor:pointer;
font-size:20px;
}

/* الفئات */
.categories{
display:flex;
justify-content:center;
gap:20px;
margin:20px;
flex-wrap:wrap;
}

.category{
background:white;
color:#0f172a;
padding:10px 20px;
border-radius:25px;
cursor:pointer;
}

/* المنتجات */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.product{
border:2px solid white;
border-radius:20px;
padding:15px;
text-align:center;
}

.price{
color:white;
font-weight:bold;
margin:10px 0;
}

button{
padding:8px 15px;
border-radius:20px;
border:none;
cursor:pointer;
}

/* السلة */
.cart{
position:fixed;
top:0;
left:-100%;
width:300px;
height:100%;
background:#1e293b;
padding:20px;
transition:.3s;
overflow:auto;
}

.cart.active{
left:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.total{
margin-top:20px;
font-weight:bold;
}

.close-cart{
cursor:pointer;
margin-bottom:15px;
}
</style>
</head>

<body>

<!-- صفحة الدخول -->
<div class="landing" id="landing">
<h1 style="font-size:40px;">وقفه</h1>
<button class="enter-btn" onclick="enterStore()">دخول المتجر</button>
</div>

<!-- المتجر -->
<div id="store" style="display:none;">

<header>
<div class="logo">وقفه</div>
<div class="cart-icon" onclick="toggleCart()">🛒</div>
</header>

<div class="categories">
<div class="category" onclick="showCategory('pens')">الأقلام</div>
<div class="category" onclick="showCategory('watches')">الساعات</div>
<div class="category" onclick="showCategory('rings')">الخواتم</div>
<div class="category" onclick="showCategory('beads')">السبح</div>
</div>

<div class="products" id="products"></div>

</div>

<!-- السلة -->
<div class="cart" id="cart">
<div class="close-cart" onclick="toggleCart()">⬅ رجوع</div>
<div id="cartItems"></div>
<div class="total">المجموع: <span id="total">0</span> ريال</div>
</div>

<script>

let products = {
pens:[
{name:"كارتير",price:99},
{name:"مونت بلاك",price:99},
{name:"جي فنشي",price:99}
],
watches:[
{name:"كاسيو",price:120},
{name:"كارتير",price:120},
{name:"روليكس",price:120}
],
rings:[
{name:"خاتم رجالي",price:30}
],
beads:[
{name:"بكلايت",price:45},
{name:"عظم جمل",price:45},
{name:"فاتوران",price:45}
]
};

let cart = [];

function enterStore(){
document.getElementById("landing").style.display="none";
document.getElementById("store").style.display="block";
}

function showCategory(cat){
let container=document.getElementById("products");
container.innerHTML="";
products[cat].forEach(p=>{
container.innerHTML+=`
<div class="product">
<h3>${p.name}</h3>
<div class="price">${p.price} ريال</div>
<button onclick='addToCart(${JSON.stringify(p)})'>أضف للسلة</button>
</div>`;
});
}

function addToCart(product){
cart.push(product);
renderCart();
}

function renderCart(){
let container=document.getElementById("cartItems");
container.innerHTML="";
let total=0;
cart.forEach((item,index)=>{
total+=item.price;
container.innerHTML+=`
<div class="cart-item">
<span>${item.name}</span>
<span>${item.price}</span>
<button onclick="removeItem(${index})">❌</button>
</div>`;
});
document.getElementById("total").innerText=total;
}

function removeItem(index){
cart.splice(index,1);
renderCart();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

</script>

</body>
</html>
