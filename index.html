<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موقع السيرفر</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:#140000;
color:#fff;
}

/* ===== صفحة الدخول ===== */
.login-page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2b0000,#140000);
}

.login-box{
background:#1e0000;
padding:40px;
border-radius:20px;
box-shadow:0 0 40px #ff0000;
text-align:center;
width:300px;
}

.login-box input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:10px;
border:none;
}

.login-box button{
width:100%;
padding:10px;
background:#ff1a1a;
border:none;
border-radius:12px;
color:#fff;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px #ff0000;
}

/* ===== الصفحة الرئيسية ===== */
#main{
display:none;
min-height:100vh;
padding:40px;
text-align:center;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:50px;
}

.card{
width:260px;
height:150px;
background:#1e0000;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 25px #ff0000;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 40px #ff3333;
}

/* لوحة التحكم */
.admin-panel{
position:fixed;
left:-100%;
top:0;
width:350px;
height:100%;
background:#220000;
padding:20px;
transition:.4s;
overflow:auto;
box-shadow:0 0 40px #ff0000;
}

.admin-panel.active{
left:0;
}

.admin-panel input{
width:100%;
padding:8px;
margin:6px 0;
border-radius:8px;
border:none;
}

.admin-panel button{
width:100%;
padding:8px;
margin-top:6px;
border:none;
border-radius:10px;
background:#ff1a1a;
color:#fff;
cursor:pointer;
}
</style>
</head>

<body>

<!-- صفحة الدخول -->
<div class="login-page" id="loginPage">
<div class="login-box">
<h2>دخول</h2>
<input type="text" id="username" placeholder="اسم المستخدم">
<input type="password" id="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
</div>
</div>

<!-- الصفحة الرئيسية -->
<div id="main">
<h1>لوحة السيرفر</h1>

<div style="margin-top:20px">
<button onclick="toggleAdmin()" style="padding:8px 20px;background:#ff1a1a;border:none;border-radius:10px;color:#fff;cursor:pointer">لوحة التحكم</button>
</div>

<div class="cards" id="cards"></div>
</div>

<!-- لوحة التحكم -->
<div class="admin-panel" id="adminPanel">
<h2>لوحة التحكم</h2>

<label>اسم المسؤول الأول</label>
<input type="text" id="admin1">

<label>اسم المسؤول الثاني</label>
<input type="text" id="admin2">

<label>رابط التفعيل (دسكورد)</label>
<input type="text" id="discordLink">

<button onclick="saveSettings()">حفظ</button>
</div>

<script>
let settings = JSON.parse(localStorage.getItem("serverSettings")) || {
admin1:"الرشيدي",
admin2:"قوست",
discord:"https://discord.com/channels/ضع_رابطك"
};

function render(){
let box=document.getElementById("cards");
box.innerHTML=`
<div class="card">${settings.admin1}</div>
<div class="card">${settings.admin2}</div>
<div class="card" onclick="activate()">التفعيل</div>
`;
}

function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u==="admin" && p==="1234"){
document.getElementById("loginPage").style.display="none";
document.getElementById("main").style.display="block";
render();
}else{
alert("بيانات خاطئة");
}
}

function toggleAdmin(){
document.getElementById("adminPanel").classList.toggle("active");
document.getElementById("admin1").value=settings.admin1;
document.getElementById("admin2").value=settings.admin2;
document.getElementById("discordLink").value=settings.discord;
}

function saveSettings(){
settings.admin1=document.getElementById("admin1").value;
settings.admin2=document.getElementById("admin2").value;
settings.discord=document.getElementById("discordLink").value;
localStorage.setItem("serverSettings",JSON.stringify(settings));
render();
alert("تم الحفظ");
}

function activate(){
window.location.href=settings.discord;
}
</script>

</body>
</html>
