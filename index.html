<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وقفة</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:#0f172a;
color:white;
text-align:center;
}

/* العنوان */
.main-title{
margin-top:60px;
font-size:55px;
}

.main-line{
width:260px;
height:4px;
background:white;
margin:15px auto 40px auto;
border-radius:5px;
}

/* الأقسام أفقية */
.categories{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:40px;
}

.cat{
width:110px;
height:110px;
border-radius:50%;
background:white;
color:#0f172a;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.cat:hover{
transform:scale(1.1);
}

/* المنتجات */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.product{
border:2px solid white;
border-radius:18px;
padding:15px;
}

.price{
margin:10px 0;
font-weight:bold;
}

/* أزرار عامة */
button{
padding:8px 15px;
border-radius:20px;
border:none;
cursor:pointer;
margin:5px;
}

/* السلة */
.cart{
position:fixed;
top:0;
left:-100%;
width:330px;
height:100%;
background:#1e293b;
padding:20px;
transition:.3s;
overflow:auto;
text-align:right;
}

.cart.active{
left:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
background:#0f172a;
padding:8px;
border-radius:12px;
}

.total{
margin-top:15px;
font-weight:bold;
}

.top-btn{
position:fixed;
top:15px;
background:white;
color:#0f172a;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

.cart-btn{left:15px;}
.login-btn{right:15px;}

.admin-panel{
background:#111827;
padding:15px;
margin:20px;
border-radius:15px;
display:none;
}

input{
padding:6px;
border-radius:10px;
border:none;
margin:4px;
}
</style>
</head>

<body>

<div class="top-btn cart-btn" onclick="toggleCart()">🛒</div>
<div class="top-btn login-btn" onclick="toggleLogin()">تسجيل</div>

<h1 class="main-title">وقفة</h1>
<div class="main-line"></div>

<div class="categories">
<div class="cat" onclick="show('pens')">أقلام</div>
<div class="cat" onclick="show('beads')">سبحات</div>
<div class="cat" onclick="show('watches')">ساعات</div>
<div class="cat" onclick="show('rings')">خواتم</div>
</div>

<div class="products" id="products"></div>

<!-- السلة -->
<div class="cart" id="cart">
<h3>السلة</h3>
<div id="cartItems"></div>
<div id="removeAll"></div>
<div class="total">المجموع: <span id="total">0</span> ريال</div>
<button onclick="toggleCart()">إغلاق</button>
</div>

<!-- لوحة التحكم -->
<div class="admin-panel" id="adminPanel">
<h3>لوحة التحكم</h3>

<input id="catInput" placeholder="الفئة pens مثلا">
<input id="nameInput" placeholder="اسم المنتج">
<input id="priceInput" placeholder="السعر">
<button onclick="addProduct()">إضافة</button>

<br>

<input id="editCat" placeholder="الفئة">
<input id="editIndex" placeholder="رقم المنتج يبدأ من 0">
<input id="editPrice" placeholder="السعر الجديد">
<button onclick="editPrice()">تغيير السعر</button>

<button onclick="toggleAvailability()">تغيير التوفر</button>
<button onclick="logout()">تسجيل خروج</button>
</div>

<script>

let currentUser = localStorage.getItem("user") || null;

let products = JSON.parse(localStorage.getItem("products")) || {
pens:[
{name:"قلم كارتير",price:99,available:true},
{name:"قلم مونت بلاك",price:99,available:true},
{name:"قلم جي فنشي",price:99,available:true}
],
watches:[
{name:"ساعة كاسيو",price:120,available:true},
{name:"ساعة كارتير",price:120,available:true},
{name:"ساعة روليكس",price:120,available:true}
],
rings:[
{name:"خاتم رجالي",price:30,available:true}
],
beads:[
{name:"سبحة بكلايت",price:45,available:true},
{name:"سبحة عظم جمل",price:45,available:true},
{name:"سبحة فاتوران",price:45,available:true}
]
};

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("cart",JSON.stringify(cart));
localStorage.setItem("user",currentUser);
}

function show(cat){
let container=document.getElementById("products");
container.innerHTML="";
products[cat].forEach((p,i)=>{
container.innerHTML+=`
<div class="product">
<h3>${p.name}</h3>
<div class="price">${p.price} ريال</div>
${p.available ? `<button onclick="add('${cat}',${i})">أضف للسلة</button>` : `<div style="color:red;">غير متوفر</div>`}
</div>`;
});
}

function add(cat,i){
cart.push(products[cat][i]);
save();
renderCart();
}

function renderCart(){
let container=document.getElementById("cartItems");
container.innerHTML="";
let total=0;

cart.forEach((item,index)=>{
total+=item.price;
container.innerHTML+=`
<div class="cart-item">
<span>${item.name}</span>
<span>${item.price}</span>
<button onclick="removeItem(${index})">❌</button>
</div>`;
});

document.getElementById("total").innerText=total;

if(cart.length>=4){
document.getElementById("removeAll").innerHTML=
`<button onclick="clearCart()">إزالة الكل</button>`;
}else{
document.getElementById("removeAll").innerHTML="";
}

save();
}

function removeItem(i){
cart.splice(i,1);
renderCart();
}

function clearCart(){
cart=[];
renderCart();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

/* تسجيل الدخول */
function toggleLogin(){
let user=prompt("اسم المستخدم:");
let pass=prompt("كلمة المرور:");

if(user==="admin" && pass==="1234"){
currentUser="admin";
document.getElementById("adminPanel").style.display="block";
alert("تم الدخول كأدمن");
}
save();
}

function logout(){
currentUser=null;
document.getElementById("adminPanel").style.display="none";
save();
alert("تم تسجيل الخروج");
}

/* لوحة التحكم */
function addProduct(){
let c=document.getElementById("catInput").value;
let n=document.getElementById("nameInput").value;
let p=parseInt(document.getElementById("priceInput").value);
products[c].push({name:n,price:p,available:true});
save();
alert("تمت الإضافة");
}

function editPrice(){
let c=document.getElementById("editCat").value;
let i=document.getElementById("editIndex").value;
let p=parseInt(document.getElementById("editPrice").value);
products[c][i].price=p;
save();
alert("تم تغيير السعر");
}

function toggleAvailability(){
let c=document.getElementById("editCat").value;
let i=document.getElementById("editIndex").value;
products[c][i].available=!products[c][i].available;
save();
alert("تم تغيير التوفر");
}

renderCart();

</script>

</body>
</html>
